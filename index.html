<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Laptop Brand Prediction</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 720px;
      margin: 60px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 26px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      font-size: 13px;
      color: #333;
      margin-bottom: 6px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    button {
      background: #111;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #000;
    }

    .result {
      margin-top: 25px;
      padding: 16px;
      border-radius: 12px;
      background: #f8f9fa;
      border: 1px solid #ddd;
      display: none;
    }

    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e6e6e6;
      font-size: 13px;
      margin-right: 8px;
      margin-bottom: 6px;
    }

    .error {
      color: #b00020;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Laptop Brand Prediction</h1>
    <div class="subtitle">
      Enter laptop specifications to predict the most likely brand.
    </div>

    <form id="predictForm">
      <div>
        <label>Price</label>
        <input type="number" id="price" min="1" step="0.01" required>
      </div>

      <div>
        <label>Screen Size (inches)</label>
        <input type="number" id="screen" step="0.1" min="8" max="25" required>
      </div>

      <div>
        <label>RAM (GB)</label>
        <select id="ram">
          <option value="4">4 GB</option>
          <option value="8">8 GB</option>
          <option value="12">12 GB</option>
          <option value="16" selected>16 GB</option>
          <option value="32">32 GB</option>
          <option value="64">64 GB</option>
        </select>
      </div>

      <div>
        <label>Storage (GB)</label>
        <select id="storage">
          <option value="128">128 GB</option>
          <option value="256">256 GB</option>
          <option value="512" selected>512 GB</option>
          <option value="1024">1 TB</option>
          <option value="2048">2 TB</option>
        </select>
      </div>

      <div>
        <label>CPU Tier</label>
        <select id="cpuTier">
          <option value="1">Tier 1 (Low)</option>
          <option value="2">Tier 2</option>
          <option value="3">Tier 3</option>
          <option value="4" selected>Tier 4</option>
          <option value="5">Tier 5 (High)</option>
        </select>
      </div>

      <div>
        <label>SSD</label>
        <select id="ssd">
          <option value="1" selected>Yes</option>
          <option value="0">No</option>
        </select>
      </div>

      <div>
        <label>Dedicated GPU</label>
        <select id="gpu">
          <option value="0" selected>No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="full">
        <button type="submit">Predict Brand</button>
      </div>
    </form>

    <div class="result" id="resultBox">
      <div id="result"></div>
      <div id="error" class="error"></div>
    </div>
  </div>

<script>
  const form = document.getElementById("predictForm");
  const resultBox = document.getElementById("resultBox");
  const resultDiv = document.getElementById("result");
  const errorDiv = document.getElementById("error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    resultDiv.innerHTML = "";
    errorDiv.textContent = "";
    resultBox.style.display = "block";

    const payload = {
      price: Number(document.getElementById("price").value),
      screen_size_in: Number(document.getElementById("screen").value),
      ram_gb: Number(document.getElementById("ram").value),
      storage_gb: Number(document.getElementById("storage").value),
      cpu_tier: Number(document.getElementById("cpuTier").value),
      is_ssd: Number(document.getElementById("ssd").value),
      dedicated_gpu: Number(document.getElementById("gpu").value)
    };

    try {
      const res = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        errorDiv.textContent = JSON.stringify(data, null, 2);
        return;
      }

      resultDiv.innerHTML = `
        <span class="pill"><b>Predicted Brand:</b> ${data.predicted_brand}</span>
        <span class="pill"><b>Performance Score:</b> ${data.performance_score.toFixed(2)}</span>
      `;
    } catch (err) {
      errorDiv.textContent = String(err);
    }
  });
</script>
</body>
</html>
